# Railway config for @braneiq/web (dashboard app).
#
# Railway UI → @braneiq/web → Settings:
#   Config file path: apps/web/railway.toml
#   Root Directory: leave empty (repo root, NOT apps/web)
#   Start Command: leave empty

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
dockerTarget = "runner"

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
