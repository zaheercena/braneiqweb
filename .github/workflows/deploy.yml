name: Deploy Website to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.14.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @braneiq/shared-types build

      - name: Build web app
        run: pnpm --filter @braneiq/web build
        env:
          NODE_ENV: production

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            apps/web/.next/standalone \
            apps/web/.next/static \
            apps/web/public \
            apps/web/package.json \
            packages/shared-types/dist \
            packages/shared-types/package.json \
            package.json \
            pnpm-workspace.yaml

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          # Copy deployment archive to EC2
          scp -i ~/.ssh/ec2_key deploy.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/
          
          # Execute deployment commands on EC2
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            
            # Create app directory if it doesn't exist
            sudo mkdir -p /var/www/braneiq-web
            sudo chown ubuntu:ubuntu /var/www/braneiq-web
            
            # Backup current deployment
            if [ -d /var/www/braneiq-web/apps ]; then
              sudo mv /var/www/braneiq-web /var/www/braneiq-web-backup-$(date +%Y%m%d-%H%M%S) || true
            fi
            
            # Extract new deployment
            sudo mkdir -p /var/www/braneiq-web
            sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/braneiq-web
            sudo chown -R ubuntu:ubuntu /var/www/braneiq-web
            
            # Install production dependencies
            cd /var/www/braneiq-web
            npm install --production
            
            # Setup environment file
            echo "NODE_ENV=production" | sudo tee /var/www/braneiq-web/.env
            echo "PORT=3000" | sudo tee -a /var/www/braneiq-web/.env
            
            # Restart or start the application with PM2
            if pm2 list | grep -q "braneiq-web"; then
              pm2 restart braneiq-web
            else
              pm2 start /var/www/braneiq-web/apps/web/.next/standalone/apps/web/server.js --name braneiq-web --cwd /var/www/braneiq-web/apps/web/.next/standalone
            fi
            
            # Save PM2 config
            pm2 save
            
            # Cleanup
            rm -f /tmp/deploy.tar.gz
            
            echo "Deployment completed successfully!"
EOF

      - name: Cleanup
        if: always()
        run: rm -f deploy.tar.gz ~/.ssh/ec2_key
