name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @braneiq/marketing...

      - name: Set GA measurement ID from GA_CODE secret
        env:
          GA_CODE: ${{ secrets.GA_CODE }}
        run: |
          ID=$(printf '%s' "$GA_CODE" | grep -oE 'G-[A-Z0-9]+' | head -1)
          if [ -z "$ID" ]; then
            echo "Could not extract GA measurement ID from GA_CODE secret"
            exit 1
          fi
          echo "NEXT_PUBLIC_GA_MEASUREMENT_ID=$ID" >> "$GITHUB_ENV"
          echo "Using GA measurement ID: $ID"

      - name: Build application
        env:
          NEXT_PUBLIC_SITE_URL: https://braneiq.com
          NEXT_PUBLIC_APP_URL: https://app.braneiq.com
          NEXT_PUBLIC_GTM_ID: GTM-5GWN244W
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: pnpm --filter @braneiq/marketing build

      - name: Create deployment archive
        run: |
          STANDALONE=apps/marketing/.next/standalone
          STATIC=apps/marketing/.next/static
          PUBLIC=apps/marketing/public
          DEPLOY=deploy

          rm -rf "$DEPLOY"
          mkdir -p "$DEPLOY/apps/marketing" "$DEPLOY/node_modules/.pnpm"

          cp "$STANDALONE/server.js" "$DEPLOY/apps/marketing/server.js"
          cp -a "$STANDALONE/.next" "$DEPLOY/apps/marketing/.next"
          rm -rf "$DEPLOY/apps/marketing/.next/static"
          cp -a "$STATIC" "$DEPLOY/apps/marketing/.next/static"
          cp -a "$PUBLIC" "$DEPLOY/apps/marketing/public"
          cp -a "$STANDALONE/node_modules" "$DEPLOY/apps/marketing/node_modules"
          cp -a apps/marketing/node_modules/.pnpm/. "$DEPLOY/node_modules/.pnpm/"
          cp -a node_modules/.pnpm/. "$DEPLOY/node_modules/.pnpm/"
          cp scripts/ec2-post-deploy.sh "$DEPLOY/ec2-post-deploy.sh"

          echo "=== Verifying bundled dependencies ==="
          test -f "$(readlink -f "$DEPLOY/apps/marketing/node_modules/next")/package.json"
          test -f "$DEPLOY/apps/marketing/server.js"

          echo "=== Deployment archive structure ==="
          find "$DEPLOY" -maxdepth 3 | sort

          COPYFILE_DISABLE=1 tar -czf deploy.tar.gz -C "$DEPLOY" .
          rm -rf "$DEPLOY"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GA_MEASUREMENT_ID: ${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          scp -i ~/.ssh/ec2_key deploy.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/

          ssh -i ~/.ssh/ec2_key \
            -o SendEnv=SMTP_USER \
            -o SendEnv=SMTP_PASS \
            -o SendEnv=GA_MEASUREMENT_ID \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "SMTP_USER='${SMTP_USER}' SMTP_PASS='${SMTP_PASS}' GA_MEASUREMENT_ID='${GA_MEASUREMENT_ID}' bash -s" << 'EOF'
            set -e

            APP_DIR=/var/www/braneiq-web
            BACKUP_DIR=/var/www/braneiq-web-backup-$(date +%Y%m%d-%H%M%S)

            if [ -d "$APP_DIR" ]; then
              sudo mv "$APP_DIR" "$BACKUP_DIR"
            fi

            sudo mkdir -p "$APP_DIR"
            sudo tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            sudo chown -R ubuntu:ubuntu "$APP_DIR"
            SMTP_USER="${SMTP_USER}" SMTP_PASS="${SMTP_PASS}" GA_MEASUREMENT_ID="${GA_MEASUREMENT_ID}" bash "$APP_DIR/ec2-post-deploy.sh"
            rm -f /tmp/deploy.tar.gz
            echo "Deployment completed!"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f deploy.tar.gz ~/.ssh/ec2_key
