name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @braneiq/marketing...

      - name: Build application
        env:
          NEXT_PUBLIC_SITE_URL: https://braneiq.com
          NEXT_PUBLIC_APP_URL: https://app.braneiq.com
          NEXT_PUBLIC_GTM_ID: GTM-5GWN244W
        run: pnpm --filter @braneiq/marketing build

      - name: Create deployment archive
        run: |
          STANDALONE=apps/marketing/.next/standalone
          STATIC=apps/marketing/.next/static
          PUBLIC=apps/marketing/public
          PKG=apps/marketing/package.json
          DEPLOY=deploy

          rm -rf "$DEPLOY"
          mkdir -p "$DEPLOY/apps/marketing"

          # Reorganize the Next.js standalone output so the application is rooted at
          # apps/marketing and node_modules is at the archive root.
          cp -a "$STANDALONE/.next" "$DEPLOY/apps/marketing/.next"
          rm -rf "$DEPLOY/apps/marketing/.next/static"
          cp -a "$STATIC" "$DEPLOY/apps/marketing/.next/static"
          cp "$STANDALONE/server.js" "$DEPLOY/apps/marketing/server.js"
          cp -a "$STANDALONE/node_modules" "$DEPLOY/node_modules"
          cp -a "$PUBLIC" "$DEPLOY/apps/marketing/public"
          cp "$PKG" "$DEPLOY/apps/marketing/package.json"
          cp scripts/ec2-post-deploy.sh "$DEPLOY/apps/marketing/ec2-post-deploy.sh"

          echo "=== Deployment archive structure ==="
          find "$DEPLOY" -maxdepth 3 | sort

          tar -czf deploy.tar.gz -C "$DEPLOY" .
          rm -rf "$DEPLOY"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          scp -i ~/.ssh/ec2_key deploy.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/

          ssh -i ~/.ssh/ec2_key \
            -o SendEnv=SMTP_USER \
            -o SendEnv=SMTP_PASS \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "SMTP_USER='${SMTP_USER}' SMTP_PASS='${SMTP_PASS}' bash -s" << 'EOF'
            set -e

            APP_DIR=/var/www/braneiq-web
            BACKUP_DIR=/var/www/braneiq-web-backup-$(date +%Y%m%d-%H%M%S)

            if [ -d "$APP_DIR" ]; then
              sudo mv "$APP_DIR" "$BACKUP_DIR"
            fi

            sudo mkdir -p "$APP_DIR"
            sudo tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            sudo chown -R ubuntu:ubuntu "$APP_DIR"
            SMTP_USER="${SMTP_USER}" SMTP_PASS="${SMTP_PASS}" bash "$APP_DIR/apps/marketing/ec2-post-deploy.sh"
            rm -f /tmp/deploy.tar.gz
            echo "Deployment completed!"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f deploy.tar.gz ~/.ssh/ec2_key
